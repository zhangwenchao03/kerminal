schema_version = 1
command = "top"
aliases = []
platforms = ["macos", "linux"]
shells = ["bash", "zsh", "fish"]
description = "Display and monitor running processes"
tested_version = "procps-ng 4.0"
owner = "kerminal"
updated_at = "2026-07-11"

[source]
name = "procps top manual"
url = "https://man7.org/linux/man-pages/man1/top.1.html"

[safety]
sensitivity = "normal"
allow_inline = true

[[options]]
name = "--batch-mode"
aliases = ["-b"]
description = "Run in non-interactive batch mode"

[[options]]
name = "--pid"
aliases = ["-p"]
description = "Monitor selected process identifiers"

[options.argument]
kind = "string"
placeholder = "PID"

[[options]]
name = "--iterations"
aliases = ["-n"]
description = "Exit after a number of updates"

[options.argument]
kind = "integer"
placeholder = "COUNT"
