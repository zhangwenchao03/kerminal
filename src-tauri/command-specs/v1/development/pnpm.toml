schema_version = 1
command = "pnpm"
aliases = []
platforms = ["windows", "macos", "linux"]
shells = ["bash", "zsh", "fish", "power_shell", "cmd"]
description = "Fast, disk-efficient JavaScript package manager"
tested_version = "pnpm 10"
owner = "kerminal"
updated_at = "2026-07-11"

[source]
name = "pnpm CLI documentation"
url = "https://pnpm.io/pnpm-cli"

[safety]
sensitivity = "normal"
allow_inline = true

[[subcommands]]
name = "add"
description = "Add package dependencies"

[[subcommands]]
name = "install"
description = "Install project dependencies"

[[subcommands]]
name = "run"
description = "Run a package script"

[[subcommands]]
name = "test"
description = "Run the test script"

[[options]]
name = "--filter"
description = "Restrict a workspace operation"

[options.argument]
kind = "string"
placeholder = "SELECTOR"

[[options]]
name = "--recursive"
aliases = ["-r"]
description = "Run in workspace packages"
