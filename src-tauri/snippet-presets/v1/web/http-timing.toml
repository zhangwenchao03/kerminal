schema_version=1
id="snippet.builtin.web.http_timing"
catalog_version="1.0.0"
pack="web"
category="http"
sort_order=100
title="HTTP 请求耗时"
description="丢弃响应体并输出状态码和分阶段耗时"
template="curl --silent --output /dev/null --max-time 15 --write-out 'status=%{http_code} dns=%{time_namelookup} connect=%{time_connect} total=%{time_total}\n' {{ url }}"
command_spec="curl"
scope="ssh"
platforms=["linux","macos"]
shells=["bash","zsh"]
capabilities=["curl"]
tags=["web","http","latency"]
risk="inspect"
duration="instant"
default_action="insert"
variables=[{name="url",label="URL",description="要诊断的 HTTP 地址",kind="url",required=true,render_strategy="shell_arg"}]
owner="kerminal"
tested_version="curl 8.14"
updated_at="2026-07-13"
source={name="curl write-out",url="https://curl.se/docs/manpage.html#-w"}
