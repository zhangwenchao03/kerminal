[[capabilities]]
id = "port_forward"
entrypoint = "src/services/port_forward_service.rs"
managed_path = "start_managed_forward -> ManagedSshSessionManager acquire session -> managed tunnel"
allowed_fallback = "Only runtime unwired or managed forward unsupported may fall back to OpenSSH process or PTY."
forbidden_fallback = "Auth failure, user cancel, host key change, jump failure, connect timeout, direct-tcpip failure, bind/listener failure after managed start."
diagnostics_evidence = "PortForwardRuntimeDiagnostics.fallbackReason and record_legacy_fallback"
test_evidence = "port_forward_service"

[[capabilities]]
id = "container.files"
entrypoint = "src/services/docker_host_service/transfer.rs"
managed_path = "Docker container file transfer uses SshCommandService streaming exec when host can be resolved through runtime materialization."
allowed_fallback = "OpenSSH docker cp fallback is explicit legacy compatibility for container archive transfer."
forbidden_fallback = "External session-only target missing, auth failure, host key change, jump failure, connect timeout."
diagnostics_evidence = "OpenSSH fallback error is explicit and named legacy fallback."
test_evidence = "docker_host_service"

