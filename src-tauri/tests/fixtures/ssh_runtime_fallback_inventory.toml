watched_files = [
  "src/services/ssh_terminal_service.rs",
  "src/services/ssh_command_service.rs",
  "src/services/sftp_service/backend.rs",
  "src/services/sftp_service/native_ssh.rs",
  "src/services/port_forward_service.rs",
