[[capabilities]]
id = "terminal.shell"
entrypoint = "src/services/ssh_terminal_service.rs"
managed_path = "ManagedSshSessionManager.acquire_session_with_request -> SshRuntimeShellRequest"
allowed_fallback = "Only backend unwired or shell capability unsupported may fall back to legacy OpenSSH terminal launch."
forbidden_fallback = "Auth failure, user cancel, host key change, jump failure, connect timeout, shell channel open failure."
diagnostics_evidence = "record_legacy_fallback"
test_evidence = "ssh_terminal_service"

[[capabilities]]
id = "exec.bounded"
entrypoint = "src/services/ssh_command_service.rs"
managed_path = "ManagedSshSessionManager.acquire_session_with_request/acquire_capability_session_with_request -> exec"
allowed_fallback = "Only backend unwired or exec capability unsupported may fall back to legacy command execution."
forbidden_fallback = "Auth failure, user cancel, host key change, jump failure, connect timeout, remote non-zero exit, permission denied."
diagnostics_evidence = "record_legacy_fallback"
test_evidence = "ssh_command_service"

[[capabilities]]
id = "exec.streaming"
