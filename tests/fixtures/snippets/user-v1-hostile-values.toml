id = "hostile-values"
title = "长命令与恶意变量"
command = "printf '%s' '{{ payload }}' && find {{ path }} -maxdepth 1 -type f"
scope = "ssh"
tags = ["security", "fixture"]

[[variables]]
name = "payload"
default = "'; rm -rf / #"

[[variables]]
name = "path"
default = "/tmp/含 空格/$(touch should-not-run)"

[fixture]
long_value = "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
