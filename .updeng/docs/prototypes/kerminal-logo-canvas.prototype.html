<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PROTOTYPE - Kerminal Canvas Logo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07090d;
        --panel: #0d1117;
        --ink: #e7f7ef;
        --muted: #8aa198;
        --green: #6cff9d;
        --cyan: #4dd9ff;
        --line: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 22% 18%, rgba(77, 217, 255, 0.16), transparent 28%),
          radial-gradient(circle at 78% 78%, rgba(108, 255, 157, 0.12), transparent 32%),
          linear-gradient(145deg, #05070a, #0b1017 48%, #06080b);
        color: var(--ink);
        font-family:
          ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo,
          monospace;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        display: grid;
        gap: 18px;
      }

      .topbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      button {
        border: 1px solid rgba(108, 255, 157, 0.35);
        border-radius: 8px;
        background: rgba(13, 17, 23, 0.82);
        color: var(--green);
        cursor: pointer;
        font: inherit;
        padding: 10px 14px;
        box-shadow: 0 0 28px rgba(108, 255, 157, 0.08);
      }

      button:hover {
        border-color: rgba(77, 217, 255, 0.65);
        color: var(--cyan);
      }

      .stage {
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        background: rgba(5, 7, 10, 0.62);
        box-shadow:
          0 28px 90px rgba(0, 0, 0, 0.48),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div>
          <h1>PROTOTYPE Kerminal logo mark</h1>
          <p>Canvas concept: terminal prompt, neon cursor, block K.</p>
        </div>
        <button id="download" type="button">Download PNG</button>
      </div>
      <div class="stage">
        <canvas id="logo" width="1120" height="760" aria-label="Kerminal logo prototype"></canvas>
      </div>
    </main>

    <script>
      const canvas = document.getElementById("logo");
      const ctx = canvas.getContext("2d");
      const downloadButton = document.getElementById("download");

      const colors = {
        bg: "#07090d",
        terminal: "#0b0f14",
        terminal2: "#111820",
        frame: "#1f2937",
        green: "#6cff9d",
        greenDeep: "#18c96f",
        cyan: "#4dd9ff",
        cyanDeep: "#1696d2",
        amber: "#ffd166",
        red: "#ff5f57",
        ink: "#e7f7ef",
        muted: "#7d928a",
      };

      function roundedRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.lineTo(x + width - r, y);
        context.quadraticCurveTo(x + width, y, x + width, y + r);
        context.lineTo(x + width, y + height - r);
        context.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        context.lineTo(x + r, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - r);
        context.lineTo(x, y + r);
        context.quadraticCurveTo(x, y, x + r, y);
        context.closePath();
      }

      function fillRounded(context, x, y, width, height, radius, fillStyle) {
        roundedRect(context, x, y, width, height, radius);
        context.fillStyle = fillStyle;
        context.fill();
      }

      function strokeRounded(context, x, y, width, height, radius, strokeStyle, lineWidth) {
        roundedRect(context, x, y, width, height, radius);
        context.strokeStyle = strokeStyle;
        context.lineWidth = lineWidth;
        context.stroke();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, "#05070a");
        gradient.addColorStop(0.5, "#0a1118");
        gradient.addColorStop(1, "#050709");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.globalAlpha = 0.16;
        ctx.strokeStyle = "#1f3a3f";
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += 32) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += 32) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawTerminalMark(now) {
        const x = 312;
        const y = 96;
        const size = 496;
        const radius = 82;
        const glow = ctx.createRadialGradient(560, 360, 60, 560, 360, 440);
        glow.addColorStop(0, "rgba(108,255,157,0.28)");
        glow.addColorStop(0.48, "rgba(77,217,255,0.12)");
        glow.addColorStop(1, "rgba(77,217,255,0)");

        ctx.fillStyle = glow;
        ctx.fillRect(120, 0, 880, 760);

        ctx.save();
        ctx.shadowColor = "rgba(77,217,255,0.45)";
        ctx.shadowBlur = 52;
        fillRounded(ctx, x, y, size, size, radius, colors.terminal);
        ctx.restore();

        const glass = ctx.createLinearGradient(x, y, x + size, y + size);
        glass.addColorStop(0, "rgba(255,255,255,0.12)");
        glass.addColorStop(0.42, "rgba(255,255,255,0.02)");
        glass.addColorStop(1, "rgba(108,255,157,0.06)");
        fillRounded(ctx, x + 2, y + 2, size - 4, size - 4, radius - 2, glass);

        const border = ctx.createLinearGradient(x, y, x + size, y + size);
        border.addColorStop(0, colors.cyan);
        border.addColorStop(0.42, "rgba(255,255,255,0.22)");
        border.addColorStop(1, colors.green);
        strokeRounded(ctx, x + 4, y + 4, size - 8, size - 8, radius - 3, border, 4);

        fillRounded(ctx, x + 38, y + 40, size - 76, 58, 22, "rgba(255,255,255,0.055)");
        const dots = [
          [x + 70, colors.red],
          [x + 102, colors.amber],
          [x + 134, colors.green],
        ];
        for (const [dotX, color] of dots) {
          ctx.beginPath();
          ctx.fillStyle = color;
          ctx.arc(dotX, y + 69, 8, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.save();
        ctx.globalAlpha = 0.28;
        ctx.fillStyle = "#9bb4aa";
        ctx.font = "700 18px ui-monospace, Consolas, monospace";
        ctx.fillText("~/kerminal", x + 176, y + 76);
        ctx.restore();

        ctx.save();
        ctx.font = "800 64px ui-monospace, Consolas, monospace";
        ctx.fillStyle = colors.green;
        ctx.shadowColor = "rgba(108,255,157,0.72)";
        ctx.shadowBlur = 18;
        ctx.fillText(">", x + 84, y + 272);
        ctx.restore();

        const kX = x + 214;
        const kY = y + 178;
        ctx.save();
        ctx.lineCap = "square";
        ctx.lineJoin = "miter";
        ctx.shadowColor = "rgba(108,255,157,0.64)";
        ctx.shadowBlur = 26;
        ctx.strokeStyle = colors.green;
        ctx.lineWidth = 40;
        ctx.beginPath();
        ctx.moveTo(kX, kY + 46);
        ctx.lineTo(kX, kY + 252);
        ctx.stroke();

        ctx.strokeStyle = colors.cyan;
        ctx.beginPath();
        ctx.moveTo(kX + 34, kY + 148);
        ctx.lineTo(kX + 170, kY + 48);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(kX + 34, kY + 150);
        ctx.lineTo(kX + 178, kY + 254);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.38;
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 2;
        for (let lineY = y + 134; lineY < y + size - 54; lineY += 22) {
          ctx.beginPath();
          ctx.moveTo(x + 58, lineY);
          ctx.lineTo(x + size - 58, lineY);
          ctx.stroke();
        }
        ctx.restore();

        const blink = Math.sin(now / 240) > 0 ? 1 : 0.24;
        ctx.save();
        ctx.globalAlpha = blink;
        ctx.fillStyle = colors.cyan;
        ctx.shadowColor = "rgba(77,217,255,0.8)";
        ctx.shadowBlur = 18;
        fillRounded(ctx, x + 382, y + 388, 58, 16, 4, colors.cyan);
        ctx.restore();
      }

      function drawSizeChecks() {
        const labels = [
          { x: 120, y: 626, size: 96, label: "96" },
          { x: 246, y: 642, size: 64, label: "64" },
          { x: 348, y: 658, size: 32, label: "32" },
        ];

        for (const item of labels) {
          const scale = item.size / 496;
          ctx.save();
          ctx.translate(item.x, item.y - item.size);
          ctx.scale(scale, scale);
          drawMiniIcon();
          ctx.restore();

          ctx.fillStyle = colors.muted;
          ctx.font = "600 13px ui-monospace, Consolas, monospace";
          ctx.fillText(item.label + "px", item.x + Math.max(0, (item.size - 34) / 2), item.y + 24);
        }

        ctx.fillStyle = colors.ink;
        ctx.font = "700 24px ui-monospace, Consolas, monospace";
        ctx.fillText("Kerminal", 506, 658);
        ctx.fillStyle = colors.muted;
        ctx.font = "500 15px ui-monospace, Consolas, monospace";
        ctx.fillText("$ run ./terminal --focus", 506, 686);
      }

      function drawMiniIcon() {
        fillRounded(ctx, 0, 0, 496, 496, 82, colors.terminal);
        strokeRounded(ctx, 8, 8, 480, 480, 76, colors.green, 18);
        fillRounded(ctx, 42, 44, 412, 56, 22, "rgba(255,255,255,0.08)");

        ctx.font = "800 66px ui-monospace, Consolas, monospace";
        ctx.fillStyle = colors.green;
        ctx.fillText(">", 76, 278);

        ctx.lineCap = "square";
        ctx.lineJoin = "miter";
        ctx.lineWidth = 42;
        ctx.strokeStyle = colors.green;
        ctx.beginPath();
        ctx.moveTo(222, 220);
        ctx.lineTo(222, 410);
        ctx.stroke();
        ctx.strokeStyle = colors.cyan;
        ctx.beginPath();
        ctx.moveTo(260, 318);
        ctx.lineTo(382, 224);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(260, 322);
        ctx.lineTo(392, 414);
        ctx.stroke();
      }

      function draw(now) {
        drawBackground();
        drawTerminalMark(now);
        drawSizeChecks();
        requestAnimationFrame(draw);
      }

      downloadButton.addEventListener("click", () => {
        const anchor = document.createElement("a");
        anchor.download = "kerminal-logo-prototype.png";
        anchor.href = canvas.toDataURL("image/png");
        anchor.click();
      });

      requestAnimationFrame(draw);
    </script>
  </body>
</html>
