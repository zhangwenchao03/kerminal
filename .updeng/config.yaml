apiVersion: updeng/v1
kind: UpdengConfig
version: 1
policy_profile: balanced
# Optional policy overrides:
# policy_direct_mode: approval
# policy_tdd: state
# policy_high_risk_approval: true
project:
  name: project
  repository: .
paths:
  engineDir: .updeng
  docsDir: .updeng/docs
  specsDir: .updeng/docs/specs
  changesDir: .updeng/docs/changes
  archiveDir: .updeng/docs/archive
  metricsDir: .updeng/docs/metrics
  auditDir: .updeng/docs/audit
  contextDir: .updeng/docs/context
defaults:
  schemaDialect: "https://json-schema.org/draft/2020-12/schema"
  isolation: worktree
  buildMode: subagent
  tddMode: recommended
  verifyMode: strict
  autoTransition: false
  commitPolicy: task
  contextCompression: balanced
  language: zh-CN
  parallelLanes: true
runtime:
  node: ">=20"
  shell: bash
  requireGit: true
  requireJq: false
  requireYq: false
policies:
  writableAllow:
    - src/**
    - tests/**
    - docs/**
    - .updeng/**
  writableDeny:
    - .env
    - secrets/**
    - infra/prod/**
  approvalRequiredFor:
    - database-migration
    - auth
    - payment
    - destructive-change
    - public-api
verification:
  commands:
    test: npm test
  requiredChecks:
    - test
hooks:
  git:
    mode: core.hooksPath
    path: .githooks
  codex:
    enabled: auto
  githubActions:
    enabled: true
skills:
  scope: project
  adapters:
    - codex
semantics:
  indexMode: ast-rg
  indexPath: .updeng/docs/context/index
  chunkSize: 1200
  overlap: 120
workflow:
  defaultDepth: planned
  directAllowedForSmallChanges: true
  requireReviewForNonTrivialChanges: true
  laneRegistry: .updeng/docs/coordination/lanes.json
events:
  enabled: true
  capture_prompt_text: false
  prompt_preview_chars: 160
  capture_evolution_signal_text: true
  evolution_signal_preview_chars: 240
skillEvolution:
  enabled: true
  mode: proposal_only
  requireManualAdoption: true
  candidatesPath: .updeng/docs/metrics/evolution-candidates.jsonl
  currentReportPath: .updeng/docs/metrics/evolution-current.md
