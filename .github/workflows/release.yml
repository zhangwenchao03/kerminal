# @author kongweiguang
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example 0.1.5 or v0.1.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || (startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version)) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            target: ""
            args: "--bundles nsis"
          - name: Linux x64
            platform: ubuntu-22.04
            target: ""
            args: "--bundles appimage,deb"
          - name: macOS arm64
            platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - name: macOS x64
            platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --bundles app,dmg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        if: matrix.target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust target
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install project dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          releaseBody: "修复了一些已知的内容"
          releaseDraft: false
          releaseName: "Kerminal ${{ env.RELEASE_TAG }}"
          tagName: ${{ env.RELEASE_TAG }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
