# @author kongweiguang
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release tag only, for example 0.1.8 or v0.1.8"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'push' && github.ref_name || inputs.version }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: Checkout release refs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify release tag and versions
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
            if [[ "${version}" == v* ]]; then
              tag="${version}"
            else
              tag="v${version}"
            fi

            if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "::error title=Missing release tag::workflow_dispatch only rebuilds an existing tag. Create and push ${tag} first."
              exit 1
            fi
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release tag::Expected vX.Y.Z or vX.Y.Z-prerelease, got ${tag}."
            exit 1
          fi

          git checkout --force "${tag}"
          export RELEASE_TAG_VALUE="${tag}"

          node <<'NODE'
          const fs = require("fs");

          const tag = process.env.RELEASE_TAG_VALUE;
          const expected = tag.replace(/^v/, "");
          const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const versions = {
            "package.json": packageVersion,
            "src-tauri/Cargo.toml": cargoVersion,
            "src-tauri/tauri.conf.json": tauriVersion,
          };
          const mismatches = Object.entries(versions).filter(([, value]) => value !== expected);
          if (mismatches.length > 0) {
            for (const [file, value] of mismatches) {
              console.error(`${file} has version ${value || "<missing>"}, expected ${expected}`);
            }
            process.exit(1);
          }
          NODE

          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"

  quality:
    name: Release quality gate
    needs: preflight
    uses: ./.github/workflows/quality.yml
    with:
      ref: ${{ needs.preflight.outputs.release_tag }}

  publish-tauri:
    name: Build ${{ matrix.name }}
    needs:
      - preflight
      - quality
    runs-on: ${{ matrix.platform }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      RELEASE_TAG: ${{ needs.preflight.outputs.release_tag }}
      HAS_TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            cache-key: windows-x64
            target: ""
            args: "--bundles nsis"
          - name: Linux x64
            platform: ubuntu-22.04
            cache-key: linux-x64
            target: ""
            args: "--bundles appimage,deb"
          - name: macOS arm64
            platform: macos-latest
            cache-key: macos-arm64
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - name: macOS x64
            platform: macos-latest
            cache-key: macos-x64
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --bundles app,dmg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.release_tag }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        if: matrix.target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust target
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: release-${{ matrix.cache-key }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify external launch security and responsiveness gates
        if: runner.os == 'Windows'
        run: |
          pnpm run verify:external-launch-security
          pnpm run verify:external-launch-responsiveness

      - name: Build and publish signed Tauri release
        if: env.HAS_TAURI_SIGNING_KEY == 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          releaseBody: |
            - 新安装默认使用紧凑界面密度，在保持浅色、深色和跟随系统主题可读性的同时提升终端与工具面板的信息密度。
            - 空工作区不再恢复陈旧的主机选择，Context Inspector 与右栏工具只展示当前真实终端目标。
            - SFTP 传输工作台隐藏没有终端上下文的目录跟随入口；终端右栏继续保留紧凑控制和目标绑定能力。
            - SSH 目录跟随新增标准 OSC 7、pane 初始目录和来源优先级兜底，协议目录建立后不再被 prompt 猜测覆盖。
            - 修正 MCP HTTP 生命周期回归测试对临时端口回退契约的错误假设，降低 Windows 发布门禁的偶发失败。

            macOS `.app` / `.dmg` 未使用 Apple Developer ID 签名，也未经过 Apple 公证；首次启动可能出现 Gatekeeper 提示，请按组织或个人环境自行处理。
          releaseDraft: true
          releaseName: "Kerminal ${{ env.RELEASE_TAG }}"
          tagName: ${{ env.RELEASE_TAG }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Build and publish unsigned Tauri release
        if: env.HAS_TAURI_SIGNING_KEY != 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }} --config scripts/tauri.unsigned.conf.json
          releaseBody: "Kerminal release build. Updater metadata is omitted because signing secrets are not configured for this repository."
          releaseDraft: true
          releaseName: "Kerminal ${{ env.RELEASE_TAG }}"
          tagName: ${{ env.RELEASE_TAG }}
          includeUpdaterJson: false

      - name: Verify Windows release package
        if: runner.os == 'Windows' && env.HAS_TAURI_SIGNING_KEY == 'true'
        run: pnpm run verify:windows-release-package -- --bundle-dir src-tauri/target/release/bundle/nsis --require-updater-signature --require-archive-inspection

      - name: Verify unsigned Windows release package
        if: runner.os == 'Windows' && env.HAS_TAURI_SIGNING_KEY != 'true'
        run: pnpm run verify:windows-release-package -- --bundle-dir src-tauri/target/release/bundle/nsis --require-archive-inspection

  publish-release:
    name: Publish GitHub release
    needs:
      - preflight
      - publish-tauri
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.preflight.outputs.release_tag }}
    steps:
      - name: Publish completed draft
        run: gh release edit "${RELEASE_TAG}" --draft=false --repo "${GITHUB_REPOSITORY}"
