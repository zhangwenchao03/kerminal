# @author kongweiguang
name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to validate; callers such as release must pass the resolved tag."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Source, test, Rust, and build gates
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout validation ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: quality-linux-x64

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare source-size ratchet reference
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: |
          set -euo pipefail
          reference_path="${RUNNER_TEMP}/source-size-reference.json"
          if [[ -n "${BASE_SHA}" ]] && \
             [[ "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]] && \
             git cat-file -e "${BASE_SHA}:scripts/source-size-baseline.json" 2>/dev/null; then
            git show "${BASE_SHA}:scripts/source-size-baseline.json" > "${reference_path}"
            echo "KERMINAL_SOURCE_SIZE_REFERENCE_BASELINE=${reference_path}" >> "${GITHUB_ENV}"
            echo "Comparing source-size debt with ${BASE_SHA}."
          else
            echo "No reference baseline exists for this event; validating the current exact snapshot."
          fi

      - name: Run the shared quality entry
        run: pnpm run check

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: quality-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .updeng/docs/verification/source-size.json
            .updeng/docs/verification/frontend-architecture.json
            .updeng/docs/verification/eslint.json
            .updeng/docs/verification/dead-code.json
          retention-days: 14
