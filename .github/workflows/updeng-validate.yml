name: Updeng Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  updeng:
    name: Updeng project checks
    if: ${{ hashFiles('.updeng/scripts/updeng-project-doctor.mjs') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Check Updeng project scaffold
        run: node .updeng/scripts/updeng-project-doctor.mjs

      - name: Check artifact templates
        run: node .updeng/scripts/updeng-artifacts.mjs list

      - name: Detect Updeng change
        id: change
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const path = require('path');

          function yamlScalar(filePath, key) {
            if (!fs.existsSync(filePath)) return null;
            const text = fs.readFileSync(filePath, 'utf8');
            const match = text.match(new RegExp(`^${key}:\\s*(.*)$`, 'm'));
            if (!match) return null;
            const value = match[1].trim().replace(/^["']|["']$/g, '');
            return value && value !== 'null' ? value : null;
          }

          function stateFor(changeId) {
            try {
              return JSON.parse(fs.readFileSync(path.join('.updeng', 'data', 'changes', changeId, 'state.json'), 'utf8'));
            } catch {
              return null;
            }
          }

          let changeId = process.env.UPDENG_CHANGE_ID || yamlScalar(path.join('.updeng', 'state.yaml'), 'active_change');
          if (!changeId && fs.existsSync(path.join('.updeng', 'data', 'changes'))) {
            const candidates = fs.readdirSync(path.join('.updeng', 'data', 'changes'), { withFileTypes: true })
              .filter((entry) => entry.isDirectory())
              .map((entry) => {
                const statePath = path.join('.updeng', 'data', 'changes', entry.name, 'state.json');
                const mtimeMs = fs.existsSync(statePath) ? fs.statSync(statePath).mtimeMs : 0;
                return { id: entry.name, state: stateFor(entry.name), mtimeMs };
              })
              .filter((item) => item.state?.kind === 'ChangeState' && item.state.status !== 'archived')
              .sort((a, b) => b.mtimeMs - a.mtimeMs);
            changeId = candidates[0]?.id || null;
          }
          if (changeId) {
            console.log(`change_id=${changeId}`);
          }
          NODE

      - name: Run strict Updeng verification
        if: ${{ steps.change.outputs.change_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -x node_modules/.bin/updeng ]; then
            UPDENG_CMD=(npx --no-install updeng)
          else
            UPDENG_CMD=(npm exec --yes --package @kong/updeng@0.1.0 -- updeng)
          fi

          if [ -f verify-suite.json ]; then
            "${UPDENG_CMD[@]}" verify "${{ steps.change.outputs.change_id }}" . --suite verify-suite.json --strict
          else
            "${UPDENG_CMD[@]}" verify "${{ steps.change.outputs.change_id }}" . --strict
          fi

      - name: Check verification evidence
        if: ${{ steps.change.outputs.change_id != '' }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const changeId = process.env.CHANGE_ID;
          const filePath = path.join('.updeng', 'data', 'changes', changeId, 'verification.json');
          if (!fs.existsSync(filePath)) {
            throw new Error(`Missing verification evidence: ${filePath}`);
          }
          const report = JSON.parse(fs.readFileSync(filePath, 'utf8'));
          if (report.kind !== 'VerificationReport') {
            throw new Error(`verification.json kind must be VerificationReport, got ${report.kind}`);
          }
          if (report.changeId !== changeId) {
            throw new Error(`verification.json changeId mismatch: ${report.changeId}`);
          }
          if (report.outcome !== 'pass') {
            throw new Error(`verification outcome must be pass, got ${report.outcome}`);
          }
          if (!Array.isArray(report.commands) || report.commands.length === 0) {
            throw new Error('verification.json must include command evidence');
          }
          NODE
        env:
          CHANGE_ID: ${{ steps.change.outputs.change_id }}
